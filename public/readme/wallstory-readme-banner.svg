<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">WallStory Calendar animated banner</title>
  <desc id="desc">A stylized wall calendar with a seasonal hero image, animated range selection, and integrated notes panel.</desc>
  <defs>
    <linearGradient id="bg" x1="120" y1="40" x2="1080" y2="620" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f3ecdf" />
      <stop offset="0.55" stop-color="#f7f2e9" />
      <stop offset="1" stop-color="#ead9cb" />
    </linearGradient>
    <linearGradient id="hero" x1="140" y1="78" x2="874" y2="278" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f9e4d6" />
      <stop offset="0.5" stop-color="#e6d7c7" />
      <stop offset="1" stop-color="#c47b59" />
    </linearGradient>
    <linearGradient id="note" x1="860" y1="352" x2="1072" y2="596" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fcf5ea" />
      <stop offset="1" stop-color="#f0dfd2" />
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="1200" height="640" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#271c12" flood-opacity="0.18" />
    </filter>
  </defs>

  <rect width="1200" height="640" rx="36" fill="url(#bg)" />
  <circle cx="1054" cy="118" r="84" fill="#bb6d4d" opacity="0.08" />
  <circle cx="154" cy="540" r="96" fill="#6f8c80" opacity="0.08" />

  <g transform="translate(0 2)">
    <animateTransform attributeName="transform" type="translate" values="0 2;0 -2;0 2" dur="4.4s" repeatCount="indefinite" />
    <g transform="translate(516 22)">
      <circle cx="0" cy="0" r="18" fill="#f8f0e6" stroke="#d5bca4" stroke-width="8" />
      <circle cx="84" cy="0" r="18" fill="#f8f0e6" stroke="#d5bca4" stroke-width="8" />
      <circle cx="168" cy="0" r="18" fill="#f8f0e6" stroke="#d5bca4" stroke-width="8" />
    </g>
  </g>

  <g filter="url(#shadow)">
    <rect x="80" y="44" width="1040" height="544" rx="42" fill="#fbf7ef" />
    <rect x="80" y="44" width="1040" height="544" rx="42" fill="none" stroke="#d9c7b6" stroke-width="2" />

    <g>
      <rect x="116" y="78" width="968" height="234" rx="32" fill="url(#hero)" />
      <circle cx="966" cy="132" r="44" fill="#fff7ef" opacity="0.5">
        <animate attributeName="cy" values="132;126;132" dur="5.5s" repeatCount="indefinite" />
      </circle>
      <path d="M116 244C212 216 314 214 420 252C528 290 634 294 742 250C846 208 952 210 1084 266V312H116V244Z" fill="#6f8c80" opacity="0.22" />
      <path d="M116 264C248 226 374 228 500 272C594 304 692 306 794 274C904 240 1006 244 1084 286V312H116V264Z" fill="#bb6d4d" opacity="0.24" />
      <rect x="154" y="116" width="240" height="70" rx="20" fill="#fff8f2" opacity="0.52" />
      <text x="186" y="162" fill="#241c17" font-family="Georgia, serif" font-size="40" letter-spacing="1.6">WallStory</text>
      <text x="154" y="218" fill="#fff8f1" font-family="Georgia, serif" font-size="54">April 2026</text>
      <text x="154" y="252" fill="#fff8f1" font-family="Arial, sans-serif" font-size="19" opacity="0.86">Range selection, monthly memo, and a calm paper-like interface.</text>
      <rect x="836" y="188" width="212" height="86" rx="24" fill="#241c17" opacity="0.16" />
      <text x="866" y="220" fill="#fffaf5" font-family="Arial, sans-serif" font-size="13" letter-spacing="2.6">SEASONAL NOTE</text>
      <text x="866" y="252" fill="#fffaf5" font-family="Georgia, serif" font-size="26">Fresh air, wet stone,</text>
      <text x="866" y="282" fill="#fffaf5" font-family="Georgia, serif" font-size="26">and something beginning again.</text>
    </g>

    <g>
      <circle cx="156" cy="312" r="6" fill="#fbf7ef" stroke="#d8c7b7" />
      <circle cx="242" cy="312" r="6" fill="#fbf7ef" stroke="#d8c7b7" />
      <circle cx="328" cy="312" r="6" fill="#fbf7ef" stroke="#d8c7b7" />
      <circle cx="414" cy="312" r="6" fill="#fbf7ef" stroke="#d8c7b7" />
      <circle cx="500" cy="312" r="6" fill="#fbf7ef" stroke="#d8c7b7" />
      <circle cx="586" cy="312" r="6" fill="#fbf7ef" stroke="#d8c7b7" />
      <circle cx="672" cy="312" r="6" fill="#fbf7ef" stroke="#d8c7b7" />
      <circle cx="758" cy="312" r="6" fill="#fbf7ef" stroke="#d8c7b7" />
      <circle cx="844" cy="312" r="6" fill="#fbf7ef" stroke="#d8c7b7" />
      <circle cx="930" cy="312" r="6" fill="#fbf7ef" stroke="#d8c7b7" />
      <circle cx="1016" cy="312" r="6" fill="#fbf7ef" stroke="#d8c7b7" />
    </g>

    <g>
      <rect x="116" y="348" width="694" height="200" rx="30" fill="#f8f3ea" stroke="#ddd0c3" />
      <text x="150" y="388" fill="#7d6757" font-family="Arial, sans-serif" font-size="13" letter-spacing="3">SELECTED RANGE</text>
      <text x="150" y="428" fill="#241c17" font-family="Georgia, serif" font-size="32">April 12 - April 18</text>
      <rect x="620" y="392" width="124" height="34" rx="17" fill="#f0ddd0" />
      <text x="646" y="414" fill="#bb6d4d" font-family="Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="2">7 DAYS</text>

      <text x="154" y="468" fill="#7d6757" font-family="Arial, sans-serif" font-size="12" letter-spacing="3">SUN</text>
      <text x="242" y="468" fill="#7d6757" font-family="Arial, sans-serif" font-size="12" letter-spacing="3">MON</text>
      <text x="330" y="468" fill="#7d6757" font-family="Arial, sans-serif" font-size="12" letter-spacing="3">TUE</text>
      <text x="418" y="468" fill="#7d6757" font-family="Arial, sans-serif" font-size="12" letter-spacing="3">WED</text>
      <text x="506" y="468" fill="#7d6757" font-family="Arial, sans-serif" font-size="12" letter-spacing="3">THU</text>
      <text x="594" y="468" fill="#7d6757" font-family="Arial, sans-serif" font-size="12" letter-spacing="3">FRI</text>
      <text x="682" y="468" fill="#7d6757" font-family="Arial, sans-serif" font-size="12" letter-spacing="3">SAT</text>

      <g fill="#fffdfa" stroke="#ddd0c3">
        <rect x="144" y="486" width="74" height="44" rx="16" />
        <rect x="232" y="486" width="74" height="44" rx="16" />
        <rect x="320" y="486" width="74" height="44" rx="16" />
        <rect x="408" y="486" width="74" height="44" rx="16" />
        <rect x="496" y="486" width="74" height="44" rx="16" />
        <rect x="584" y="486" width="74" height="44" rx="16" />
        <rect x="672" y="486" width="74" height="44" rx="16" />
      </g>

      <rect x="228" y="492" width="266" height="32" rx="16" fill="#f0ddd0">
        <animate attributeName="opacity" values="0.7;1;0.7" dur="3.2s" repeatCount="indefinite" />
      </rect>
      <rect x="232" y="486" width="74" height="44" rx="16" fill="#bb6d4d" />
      <rect x="496" y="486" width="74" height="44" rx="16" fill="#bb6d4d" />
      <text x="172" y="515" fill="#241c17" font-family="Arial, sans-serif" font-size="20">11</text>
      <text x="260" y="515" fill="#fffaf5" font-family="Arial, sans-serif" font-size="20">12</text>
      <text x="348" y="515" fill="#241c17" font-family="Arial, sans-serif" font-size="20">13</text>
      <text x="436" y="515" fill="#241c17" font-family="Arial, sans-serif" font-size="20">14</text>
      <text x="524" y="515" fill="#fffaf5" font-family="Arial, sans-serif" font-size="20">18</text>
      <text x="612" y="515" fill="#241c17" font-family="Arial, sans-serif" font-size="20">19</text>
      <text x="700" y="515" fill="#241c17" font-family="Arial, sans-serif" font-size="20">20</text>
    </g>

    <g>
      <rect x="840" y="348" width="244" height="200" rx="30" fill="url(#note)" stroke="#ddd0c3" />
      <text x="872" y="388" fill="#7d6757" font-family="Arial, sans-serif" font-size="13" letter-spacing="3">MONTH MEMO</text>
      <text x="872" y="424" fill="#241c17" font-family="Georgia, serif" font-size="28">April memo</text>
      <rect x="872" y="448" width="180" height="12" rx="6" fill="#d6c5b7" opacity="0.9">
        <animate attributeName="width" values="180;150;180" dur="3.8s" repeatCount="indefinite" />
      </rect>
      <rect x="872" y="474" width="146" height="12" rx="6" fill="#d6c5b7" opacity="0.82" />
      <rect x="872" y="500" width="168" height="12" rx="6" fill="#d6c5b7" opacity="0.74" />
      <rect x="872" y="528" width="132" height="12" rx="6" fill="#d6c5b7" opacity="0.65" />
      <rect x="872" y="564" width="112" height="30" rx="15" fill="#ffffff" opacity="0.9" />
      <text x="900" y="584" fill="#241c17" font-family="Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="1.4">SAVE NOTE</text>
      <rect x="1048" y="448" width="4" height="90" rx="2" fill="#bb6d4d">
        <animate attributeName="opacity" values="0;1;0" dur="1.1s" repeatCount="indefinite" />
      </rect>
    </g>
  </g>

  <text x="82" y="618" fill="#7d6757" font-family="Arial, sans-serif" font-size="14" letter-spacing="2.2">Frontend-only Next.js component with responsive range selection, local notes, and motion-rich presentation.</text>
</svg>
